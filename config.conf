# =============================================================
# BlueFilter - Configuration File
# Managed by the WebUI. Manual edits are not supported.
# =============================================================
#
# HOW IT WORKS:
#   SurfaceFlinger applies a 4x4 color matrix at the compositor level,
#   covering the entire display (status bar, nav bar, all apps).
#   R / G / B range from 0.0 (cut) to 1.0 (full intensity).
#   Red minimum is 0.10 — lower values cause a completely black screen.
#
# The WebUI writes the active color under [profiles] as "custom=R G B"
# and sets [default] profile=custom. Do not edit this file by hand.

[profiles]

[default]
profile=off
